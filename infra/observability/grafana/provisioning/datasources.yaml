apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://127.0.0.1:9090
    access: proxy
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
          urlDisplayLabel: "Abrir traza"

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://127.0.0.1:3200
    access: proxy
    editable: false
    jsonData:
      tracesToLogsV2:
        customQuery: true
        datasourceUid: loki
        query: '{$${__tags}} | trace_id = "$${__trace.traceId}"'
        tags:
          - key: service.name
            value: service_name
      serviceMap:
        datasourceUid: prometheus
      search:
        hide: false
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki

  - name: Loki
    type: loki
    uid: loki
    url: http://127.0.0.1:3100
    access: proxy
    editable: false
    jsonData:
      derivedFields:
        - name: trace_id
          matcherType: label
          matcherRegex: trace_id
          url: "$${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "Abrir traza"
