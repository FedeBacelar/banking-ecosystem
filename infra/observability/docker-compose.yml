services:
  observability:
    image: grafana/otel-lgtm:0.29.0
    container_name: banking-observability
    restart: "no"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-nerva-local}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      PROMETHEUS_EXTRA_ARGS: >-
        --storage.tsdb.retention.time=7d
        --storage.tsdb.retention.size=1GB
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:4318:4318"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - observability_data:/data
      - ./config/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - ./config/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - ./config/loki-config.yaml:/otel-lgtm/loki-config.yaml:ro
      - ./config/tempo-config.yaml:/otel-lgtm/tempo-config.yaml:ro
      - ./grafana/provisioning/datasources.yaml:/otel-lgtm/grafana/conf/provisioning/datasources/grafana-datasources.yaml:ro
      - ./grafana/provisioning/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/nerva-dashboards.yaml:ro
      - ./grafana/dashboards:/otel-lgtm/dashboards:ro
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/ready && /otel-lgtm/docker/healthcheck.sh
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s
    mem_limit: 4g
    cpus: 2.0
    stop_grace_period: 30s

volumes:
  observability_data:
