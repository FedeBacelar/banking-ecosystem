services:
  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: banking-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nerva_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nerva_minio_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-bucket-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    container_name: banking-minio-bucket-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nerva_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nerva_minio_password}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-banking-documents}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$MINIO_BUCKET_NAME &&
      mc anonymous set none local/$$MINIO_BUCKET_NAME
      "
    restart: "no"

volumes:
  minio_data:

