      MYSQL_DATABASE: ${DOCUMENT_DB_NAME:-document_db}
      MYSQL_USER: ${DOCUMENT_DB_USERNAME:-document_user}
      MYSQL_PASSWORD: ${DOCUMENT_DB_PASSWORD:-document_password}
      MYSQL_ROOT_PASSWORD: ${DOCUMENT_DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${DOCUMENT_DB_PORT:-3311}:3306"
    volumes:
      - document_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  onboarding-mysql:
    image: mysql:8.4
    container_name: onboarding-mysql
    environment:
      MYSQL_DATABASE: ${ONBOARDING_DB_NAME:-onboarding_db}
      MYSQL_USER: ${ONBOARDING_DB_USERNAME:-onboarding_user}
      MYSQL_PASSWORD: ${ONBOARDING_DB_PASSWORD:-onboarding_password}
      MYSQL_ROOT_PASSWORD: ${ONBOARDING_DB_ROOT_PASSWORD:-root_password}
