      MYSQL_DATABASE: ${NOTIFICATION_DB_NAME:-notification_db}
      MYSQL_USER: ${NOTIFICATION_DB_USERNAME:-notification_user}
      MYSQL_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-notification_password}
      MYSQL_ROOT_PASSWORD: ${NOTIFICATION_DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${NOTIFICATION_DB_PORT:-3310}:3306"
    volumes:
      - notification_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  document-mysql:
    image: mysql:8.4
    container_name: document-mysql
