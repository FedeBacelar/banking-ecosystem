    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  customer_mysql_data:
  account_mysql_data:
  identity_mysql_data:
  notification_mysql_data:
  document_mysql_data:
  onboarding_mysql_data:
