services:
  customer-mysql:
    image: mysql:8.4
    container_name: customer-mysql
    environment:
      MYSQL_DATABASE: ${CUSTOMER_DB_NAME:-customer_db}
      MYSQL_USER: ${CUSTOMER_DB_USERNAME:-customer_user}
      MYSQL_PASSWORD: ${CUSTOMER_DB_PASSWORD:-customer_password}
      MYSQL_ROOT_PASSWORD: ${CUSTOMER_DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${CUSTOMER_DB_PORT:-3307}:3306"
    volumes:
      - customer_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  account-mysql:
    image: mysql:8.4
    container_name: account-mysql
    environment:
      MYSQL_DATABASE: ${ACCOUNT_DB_NAME:-account_db}
      MYSQL_USER: ${ACCOUNT_DB_USERNAME:-account_user}
      MYSQL_PASSWORD: ${ACCOUNT_DB_PASSWORD:-account_password}
      MYSQL_ROOT_PASSWORD: ${ACCOUNT_DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${ACCOUNT_DB_PORT:-3308}:3306"
    volumes:
      - account_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  identity-mysql:
    image: mysql:8.4
    container_name: identity-mysql
