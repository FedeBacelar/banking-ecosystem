services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: banking-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      HOME_BANKING_BFF_OAUTH_CLIENT_SECRET: ${HOME_BANKING_BFF_OAUTH_CLIENT_SECRET:-local-bff-secret}
      ONBOARDING_BFF_INTERNAL_OAUTH_CLIENT_SECRET: ${ONBOARDING_BFF_INTERNAL_OAUTH_CLIENT_SECRET:-local-onboarding-bff-secret}
      HOME_BANKING_INTERNAL_OAUTH_CLIENT_SECRET: ${HOME_BANKING_INTERNAL_OAUTH_CLIENT_SECRET:-local-home-banking-service-secret}
      ONBOARDING_INTERNAL_OAUTH_CLIENT_SECRET: ${ONBOARDING_INTERNAL_OAUTH_CLIENT_SECRET:-local-onboarding-secret}
      ACCOUNT_INTERNAL_OAUTH_CLIENT_SECRET: ${ACCOUNT_INTERNAL_OAUTH_CLIENT_SECRET:-local-account-secret}
      BANKING_FRONTEND_URL: ${BANKING_FRONTEND_URL:-http://localhost:4200}
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8090}
      KC_HOSTNAME_STRICT: "true"
      KEYCLOAK_SMTP_HOST: ${KEYCLOAK_LOCAL_SMTP_HOST:-host.docker.internal}
      KEYCLOAK_SMTP_PORT: ${KEYCLOAK_LOCAL_SMTP_PORT:-1025}
      KEYCLOAK_SMTP_FROM: ${KEYCLOAK_LOCAL_SMTP_FROM:-no-reply@nerva.local}
      KEYCLOAK_SMTP_USERNAME: ${KEYCLOAK_LOCAL_SMTP_USERNAME:-}
      KEYCLOAK_SMTP_PASSWORD: ${KEYCLOAK_LOCAL_SMTP_PASSWORD:-}
      KEYCLOAK_SMTP_AUTH: ${KEYCLOAK_LOCAL_SMTP_AUTH:-false}
      KEYCLOAK_SMTP_STARTTLS: ${KEYCLOAK_LOCAL_SMTP_STARTTLS:-false}
      KEYCLOAK_SMTP_SSL: ${KEYCLOAK_LOCAL_SMTP_SSL:-false}
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
    ports:
      - "${KEYCLOAK_PORT:-8090}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./password-blacklists:/opt/keycloak/data/password-blacklists:ro
      - ./realms/banking-ecosystem-realm.json:/opt/keycloak/data/import/banking-ecosystem-realm.json:ro
      - ./themes:/opt/keycloak/themes:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /realms/master HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20

  keycloak-realm-init:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: banking-keycloak-realm-init
    depends_on:
      keycloak:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-ec"]
    command:
      - |
        /opt/keycloak/bin/kcadm.sh config credentials \
          --server http://keycloak:8080 \
          --realm master \
          --user "$${KEYCLOAK_ADMIN_USERNAME}" \
          --password "$${KEYCLOAK_ADMIN_PASSWORD}"
        /opt/keycloak/bin/kcadm.sh update \
          realms/banking-ecosystem/users/profile \
          -f /config/banking-user-profile.json

        FRONTEND_URL="$${BANKING_FRONTEND_URL%/}"
        SMTP_CONFIG="{\"host\":\"$${KEYCLOAK_SMTP_HOST}\",\"port\":\"$${KEYCLOAK_SMTP_PORT}\",\"from\":\"$${KEYCLOAK_SMTP_FROM}\",\"fromDisplayName\":\"Nerva Banking\",\"auth\":\"$${KEYCLOAK_SMTP_AUTH}\",\"starttls\":\"$${KEYCLOAK_SMTP_STARTTLS}\",\"ssl\":\"$${KEYCLOAK_SMTP_SSL}\""
        if test -n "$${KEYCLOAK_SMTP_USERNAME}"; then
          SMTP_CONFIG="$$SMTP_CONFIG,\"user\":\"$${KEYCLOAK_SMTP_USERNAME}\",\"password\":\"$${KEYCLOAK_SMTP_PASSWORD}\""
        fi
        SMTP_CONFIG="$$SMTP_CONFIG}"

        /opt/keycloak/bin/kcadm.sh update realms/banking-ecosystem \
          -s 'displayName=Nerva Banking' \
          -s 'loginTheme=banking' \
          -s 'emailTheme=banking' \
          -s 'passwordPolicy=length(15) and maxLength(64) and notUsername and notEmail and passwordBlacklist(nerva-passwords.txt)' \
          -s 'internationalizationEnabled=true' \
          -s 'defaultLocale=es' \
          -s 'supportedLocales=["es"]' \
          -s "smtpServer=$$SMTP_CONFIG"

        /opt/keycloak/bin/kcadm.sh update authentication/required-actions/UPDATE_PROFILE \
          -r banking-ecosystem \
          -s 'priority=30'
        /opt/keycloak/bin/kcadm.sh update authentication/required-actions/UPDATE_PASSWORD \
          -r banking-ecosystem \
          -s 'priority=40'

        reconcile_client_secret() {
          local client_id="$$1"
          local client_secret="$$2"
          local client_uuid
          client_uuid=$$(/opt/keycloak/bin/kcadm.sh get clients \
            -r banking-ecosystem \
            -q clientId="$$client_id" \
            --fields id \
            --format csv \
            --noquotes)
          test -n "$$client_uuid"
          /opt/keycloak/bin/kcadm.sh update "clients/$$client_uuid" \
            -r banking-ecosystem \
            -s "secret=$$client_secret"
        }

        ensure_realm_role() {
          local role_name="$$1"
          local role_description="$$2"
          if /opt/keycloak/bin/kcadm.sh get "roles/$$role_name" \
            -r banking-ecosystem >/dev/null 2>&1; then
            /opt/keycloak/bin/kcadm.sh update "roles/$$role_name" \
              -r banking-ecosystem \
              -s "description=$$role_description"
          else
            /opt/keycloak/bin/kcadm.sh create roles \
              -r banking-ecosystem \
              -s "name=$$role_name" \
              -s "description=$$role_description"
          fi
        }

        ensure_service_client() {
          local client_id="$$1"
          local client_name="$$2"
          local client_description="$$3"
          local client_uuid
          client_uuid=$$(/opt/keycloak/bin/kcadm.sh get clients \
            -r banking-ecosystem \
            -q clientId="$$client_id" \
            --fields id \
            --format csv \
            --noquotes)
          if test -z "$$client_uuid"; then
            /opt/keycloak/bin/kcadm.sh create clients \
              -r banking-ecosystem \
              -s "clientId=$$client_id" \
              -s "name=$$client_name" \
              -s "description=$$client_description" \
              -s 'enabled=true' \
              -s 'protocol=openid-connect' \
              -s 'publicClient=false' \
              -s 'clientAuthenticatorType=client-secret' \
              -s 'standardFlowEnabled=false' \
              -s 'implicitFlowEnabled=false' \
              -s 'directAccessGrantsEnabled=false' \
              -s 'serviceAccountsEnabled=true'
            client_uuid=$$(/opt/keycloak/bin/kcadm.sh get clients \
              -r banking-ecosystem \
              -q clientId="$$client_id" \
              --fields id \
              --format csv \
              --noquotes)
          fi
          test -n "$$client_uuid"
          /opt/keycloak/bin/kcadm.sh update "clients/$$client_uuid" \
            -r banking-ecosystem \
            -s "name=$$client_name" \
            -s "description=$$client_description" \
            -s 'enabled=true' \
            -s 'protocol=openid-connect' \
            -s 'publicClient=false' \
            -s 'clientAuthenticatorType=client-secret' \
            -s 'standardFlowEnabled=false' \
            -s 'implicitFlowEnabled=false' \
            -s 'directAccessGrantsEnabled=false' \
            -s 'serviceAccountsEnabled=true'
        }

        MANAGED_REALM_ROLES="HOME_BANKING_USER CUSTOMER_READ CUSTOMER_WRITE CUSTOMER_PROVISION ACCOUNT_READ ACCOUNT_WRITE ACCOUNT_PROVISION IDENTITY_READ IDENTITY_WRITE IDENTITY_PROVISION NOTIFICATION_WRITE DOCUMENT_READ DOCUMENT_WRITE ONBOARDING_READ ONBOARDING_WRITE ONBOARDING_OPERATE"

        reconcile_exact_realm_roles() {
          local username="$$1"
          shift
          local desired_roles="$$*"
          local user_id
          user_id=$$(/opt/keycloak/bin/kcadm.sh get users \
            -r banking-ecosystem \
            -q exact=true \
            -q username="$$username" \
            --fields id \
            --format csv \
            --noquotes)
          test -n "$$user_id"

          local current_roles
          current_roles=$$(/opt/keycloak/bin/kcadm.sh get "users/$$user_id/role-mappings/realm" \
            -r banking-ecosystem \
            --fields name \
            --format csv \
            --noquotes)
          for role_name in $$MANAGED_REALM_ROLES; do
            local expected=false
            for desired_role in $$desired_roles; do
              if test "$$desired_role" = "$$role_name"; then
                expected=true
                break
              fi
            done
            if printf '%s\n' "$$current_roles" | grep -Fxq "$$role_name"; then
              if test "$$expected" = true; then
                continue
              fi
              /opt/keycloak/bin/kcadm.sh remove-roles \
                -r banking-ecosystem \
                --uid "$$user_id" \
                --rolename "$$role_name"
            elif test "$$expected" = true; then
              /opt/keycloak/bin/kcadm.sh add-roles \
                -r banking-ecosystem \
                --uid "$$user_id" \
                --rolename "$$role_name"
            fi
          done

          current_roles=$$(/opt/keycloak/bin/kcadm.sh get "users/$$user_id/role-mappings/realm" \
            -r banking-ecosystem \
            --fields name \
            --format csv \
            --noquotes)
          for role_name in $$MANAGED_REALM_ROLES; do
            local expected=false
            for desired_role in $$desired_roles; do
              if test "$$desired_role" = "$$role_name"; then
                expected=true
                break
              fi
            done
            if printf '%s\n' "$$current_roles" | grep -Fxq "$$role_name"; then
              test "$$expected" = true
            else
              test "$$expected" = false
            fi
          done
        }

        reconcile_browser_client() {
          local client_uuid
          client_uuid=$$(/opt/keycloak/bin/kcadm.sh get clients \
            -r banking-ecosystem \
            -q clientId=home-banking-bff \
            --fields id \
            --format csv \
            --noquotes)
          test -n "$$client_uuid"
          /opt/keycloak/bin/kcadm.sh update "clients/$$client_uuid" \
            -r banking-ecosystem \
            -s "rootUrl=$$FRONTEND_URL" \
            -s "baseUrl=$$FRONTEND_URL" \
            -s "redirectUris=[\"http://localhost:8085/web/login/oauth2/code/keycloak\",\"http://localhost:8085/web/login/oauth2/code/keycloak-onboarding-completion\",\"http://localhost:8085/web/auth/login/onboarding-completion\",\"$$FRONTEND_URL/onboarding/credentials-complete\"]" \
            -s "webOrigins=[\"http://localhost:8085\",\"$$FRONTEND_URL\"]" \
            -s "attributes={\"post.logout.redirect.uris\":\"$$FRONTEND_URL/*\"}"
        }

        reconcile_browser_client
        ensure_realm_role CUSTOMER_PROVISION "Allows onboarding to create a customer record and approve its initial KYC."
        ensure_realm_role ACCOUNT_PROVISION "Allows onboarding to open and activate the initial account for an approved application."
        ensure_realm_role IDENTITY_PROVISION "Allows onboarding to link the approved customer with their Keycloak identity."
        ensure_realm_role ONBOARDING_OPERATE "Allows an operator to execute protected onboarding operations."
        ensure_service_client account-service "Account Service" "Machine client used by account-service for customer eligibility reads."
        reconcile_client_secret home-banking-bff "$$HOME_BANKING_BFF_OAUTH_CLIENT_SECRET"
        reconcile_client_secret onboarding-bff-service "$$ONBOARDING_BFF_INTERNAL_OAUTH_CLIENT_SECRET"
        reconcile_client_secret home-banking-bff-service "$$HOME_BANKING_INTERNAL_OAUTH_CLIENT_SECRET"
        reconcile_client_secret onboarding-orchestrator "$$ONBOARDING_INTERNAL_OAUTH_CLIENT_SECRET"
        reconcile_client_secret account-service "$$ACCOUNT_INTERNAL_OAUTH_CLIENT_SECRET"

        reconcile_exact_realm_roles service-account-onboarding-bff-service \
          ONBOARDING_READ ONBOARDING_WRITE
        reconcile_exact_realm_roles service-account-home-banking-bff-service \
          CUSTOMER_READ ACCOUNT_READ IDENTITY_READ
        reconcile_exact_realm_roles service-account-onboarding-orchestrator \
          CUSTOMER_READ CUSTOMER_PROVISION \
          ACCOUNT_READ ACCOUNT_PROVISION \
          IDENTITY_READ IDENTITY_PROVISION \
          DOCUMENT_READ DOCUMENT_WRITE NOTIFICATION_WRITE
        reconcile_exact_realm_roles service-account-account-service CUSTOMER_READ
        reconcile_exact_realm_roles banking-admin \
          CUSTOMER_READ CUSTOMER_WRITE CUSTOMER_PROVISION \
          ACCOUNT_READ ACCOUNT_WRITE ACCOUNT_PROVISION \
          IDENTITY_READ IDENTITY_WRITE IDENTITY_PROVISION \
          NOTIFICATION_WRITE DOCUMENT_READ DOCUMENT_WRITE \
          ONBOARDING_READ ONBOARDING_WRITE ONBOARDING_OPERATE
        reconcile_exact_realm_roles home-banking-user HOME_BANKING_USER
    environment:
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      HOME_BANKING_BFF_OAUTH_CLIENT_SECRET: ${HOME_BANKING_BFF_OAUTH_CLIENT_SECRET:-local-bff-secret}
      ONBOARDING_BFF_INTERNAL_OAUTH_CLIENT_SECRET: ${ONBOARDING_BFF_INTERNAL_OAUTH_CLIENT_SECRET:-local-onboarding-bff-secret}
      HOME_BANKING_INTERNAL_OAUTH_CLIENT_SECRET: ${HOME_BANKING_INTERNAL_OAUTH_CLIENT_SECRET:-local-home-banking-service-secret}
      ONBOARDING_INTERNAL_OAUTH_CLIENT_SECRET: ${ONBOARDING_INTERNAL_OAUTH_CLIENT_SECRET:-local-onboarding-secret}
      ACCOUNT_INTERNAL_OAUTH_CLIENT_SECRET: ${ACCOUNT_INTERNAL_OAUTH_CLIENT_SECRET:-local-account-secret}
      BANKING_FRONTEND_URL: ${BANKING_FRONTEND_URL:-http://localhost:4200}
      KEYCLOAK_SMTP_HOST: ${KEYCLOAK_LOCAL_SMTP_HOST:-host.docker.internal}
      KEYCLOAK_SMTP_PORT: ${KEYCLOAK_LOCAL_SMTP_PORT:-1025}
      KEYCLOAK_SMTP_FROM: ${KEYCLOAK_LOCAL_SMTP_FROM:-no-reply@nerva.local}
      KEYCLOAK_SMTP_USERNAME: ${KEYCLOAK_LOCAL_SMTP_USERNAME:-}
      KEYCLOAK_SMTP_PASSWORD: ${KEYCLOAK_LOCAL_SMTP_PASSWORD:-}
      KEYCLOAK_SMTP_AUTH: ${KEYCLOAK_LOCAL_SMTP_AUTH:-false}
      KEYCLOAK_SMTP_STARTTLS: ${KEYCLOAK_LOCAL_SMTP_STARTTLS:-false}
      KEYCLOAK_SMTP_SSL: ${KEYCLOAK_LOCAL_SMTP_SSL:-false}
    volumes:
      - ./realms/banking-user-profile.json:/config/banking-user-profile.json:ro
    restart: "no"

volumes:
  keycloak_data:
