<main class="onboarding-shell">
  <section class="brand-panel" aria-label="Nerva Banking">
    <div class="brand-panel__content">
      <div class="brand-mark">NB</div>
      <p class="brand-eyebrow">{{ eyebrow() }}</p>
      <h1>Apertura digital de cuenta</h1>
      <p>
        Iniciá tu solicitud con validación por correo y continuá el trámite en un entorno protegido.
      </p>
    </div>
  </section>

  <section class="flow-panel">
    <div class="flow-panel__top">
      <span class="mobile-brand">Nerva Banking</span>
      <span class="secure-label">Acceso seguro</span>
    </div>

    <div class="flow-panel__center">
      <article class="flow-card">
        <header class="flow-card__header">
          <p>{{ eyebrow() }}</p>
          <h2>{{ title() }}</h2>
          <span>{{ subtitle() }}</span>
        </header>

        <div class="flow-card__body">
          <ng-content />
        </div>
      </article>
    </div>
  </section>
</main>
