<app-onboarding-shell
  title="Validando enlace"
  subtitle="Estamos verificando el enlace seguro para continuar tu solicitud.">
  @if (isLoading()) {
    <div class="status-panel">
      <strong>Un momento</strong>
      <span>Validando el enlace recibido por correo.</span>
    </div>
  }

  @if (errorMessage()) {
    <div class="alert alert--error" role="alert">{{ errorMessage() }}</div>
    <a class="secondary-link" routerLink="/onboarding/start">Solicitar un nuevo enlace</a>
  }
</app-onboarding-shell>
