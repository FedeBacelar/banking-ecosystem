<app-onboarding-shell
  title="Abrí tu cuenta"
  subtitle="Ingresá tu email para recibir un enlace seguro y comenzar la solicitud.">
  <form class="form-stack" [formGroup]="form" (ngSubmit)="submit()">
    <label class="field">
      <span>Email</span>
      <input
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="tuemail@ejemplo.com"
        [attr.aria-invalid]="showEmailError" />
    </label>

    @if (showEmailError) {
      <p class="field-error">Ingresá un email válido.</p>
    }

    @if (errorMessage()) {
      <div class="alert alert--error" role="alert">{{ errorMessage() }}</div>
    }

    <button class="primary-button" type="submit" [disabled]="isSubmitting()">
      @if (isSubmitting()) {
        Enviando...
      } @else {
        Enviar enlace
      }
    </button>
  </form>

  <p class="supporting-copy">
    Si ya recibiste un enlace, abrilo desde el correo para continuar el trámite.
  </p>
</app-onboarding-shell>
