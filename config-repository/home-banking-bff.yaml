server:
  port: ${HOME_BANKING_BFF_PORT:8086}
  servlet:
    context-path: /web
  forward-headers-strategy: framework

spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${HOME_BANKING_BFF_OAUTH_CLIENT_ID:home-banking-bff}
            client-secret: ${HOME_BANKING_BFF_OAUTH_CLIENT_SECRET:local-bff-secret}
            authorization-grant-type: authorization_code
            redirect-uri: ${HOME_BANKING_BFF_OAUTH_REDIRECT_URI:http://localhost:8085/web/login/oauth2/code/keycloak}
            scope:
              - openid
              - profile
              - email
          keycloak-service:
            provider: keycloak
            client-id: ${HOME_BANKING_BFF_INTERNAL_OAUTH_CLIENT_ID:home-banking-bff}
            client-secret: ${HOME_BANKING_BFF_INTERNAL_OAUTH_CLIENT_SECRET:local-bff-secret}
            authorization-grant-type: client_credentials
            scope:
              - openid
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/banking-ecosystem}
  session:
    cookie:
      http-only: true
      same-site: lax
      secure: ${HOME_BANKING_BFF_COOKIE_SECURE:false}

home-banking-bff:
  onboarding:
    cookie:
      secure: "${HOME_BANKING_BFF_ONBOARDING_COOKIE_SECURE:${HOME_BANKING_BFF_COOKIE_SECURE:false}}"

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

info:
  app:
    name: home-banking-bff
    description: Browser-facing backend for home banking sessions
    version: 0.0.1-SNAPSHOT
