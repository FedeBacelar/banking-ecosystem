spring:
  datasource:
    url: ${CUSTOMER_DB_URL:jdbc:mysql://localhost:3307/customer_db}
    username: ${CUSTOMER_DB_USERNAME:customer_user}
    password: ${CUSTOMER_DB_PASSWORD:customer_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${CUSTOMER_SERVICE_PORT:8080}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  app:
    name: customer-service
    description: Customer service for natural person customer onboarding
    version: 0.0.1-SNAPSHOT
