server:
  port: ${NOTIFICATION_SERVICE_PORT:8083}

spring:
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:mysql://localhost:3310/notification_db}
    username: ${NOTIFICATION_DB_USERNAME:notification_user}
    password: ${NOTIFICATION_DB_PASSWORD:notification_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  mail:
    host: ${NOTIFICATION_SMTP_HOST:localhost}
    port: ${NOTIFICATION_SMTP_PORT:1025}
    username: ${NOTIFICATION_SMTP_USERNAME:}
    password: ${NOTIFICATION_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${NOTIFICATION_SMTP_AUTH:false}
          starttls:
            enable: ${NOTIFICATION_SMTP_STARTTLS:false}
            required: ${NOTIFICATION_SMTP_STARTTLS_REQUIRED:false}
          ssl:
            enable: ${NOTIFICATION_SMTP_SSL:false}
          connectiontimeout: ${NOTIFICATION_SMTP_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${NOTIFICATION_SMTP_READ_TIMEOUT_MS:10000}
          writetimeout: ${NOTIFICATION_SMTP_WRITE_TIMEOUT_MS:10000}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/banking-ecosystem}

notification:
  action-links:
    onboarding-allowed-origins: ${NOTIFICATION_MAGIC_LINK_ALLOWED_ORIGINS:http://localhost:4200}
    keycloak-allowed-origins: ${NOTIFICATION_KEYCLOAK_ACTION_ALLOWED_ORIGINS:http://localhost:8090}
  email:
    from: ${NOTIFICATION_SMTP_FROM:no-reply@nerva.local}
    from-name: ${NOTIFICATION_SMTP_FROM_NAME:Nerva Banking}

banking:
  security:
    public-docs-enabled: ${PUBLIC_DOCS_ENABLED:true}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

info:
  app:
    name: notification-service
    description: Notification service for banking communications
    version: 0.0.1-SNAPSHOT

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: ${SWAGGER_OAUTH_CLIENT_ID:banking-swagger}
      use-pkce-with-authorization-code-grant: true

