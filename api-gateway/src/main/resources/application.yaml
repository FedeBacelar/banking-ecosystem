spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

# Edge client identity starts from the TCP peer. Forwarding headers are
# evaluated only after the rate-limit resolver validates an explicit proxy CIDR.
server:
  forward-headers-strategy: none

otel:
  sdk:
    # Observability is opt-in. Only application-observability.yaml may enable
    # the SDK; an environment variable alone must not change the base profile.
    disabled: true

management:
  prometheus:
    metrics:
      export:
        enabled: false
